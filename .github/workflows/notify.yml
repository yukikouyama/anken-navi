name: Morning LINE Notification

on:
  schedule:
    # 毎朝8時 JST = 23時 UTC（前日）
    - cron: "0 23 * * *"
  workflow_dispatch: # 手動実行でテスト可能

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Send morning summary to LINE
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: node functions/notify.js
